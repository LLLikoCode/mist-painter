# Build Pipeline for Mist Painter (迷雾绘者)
# Multi-platform export: Windows, Linux, Web

name: Build - Multi-Platform Export

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform (windows, linux, web, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - linux
          - web

env:
  GODOT_VERSION: "4.2.2"
  EXPORT_NAME: "mist-painter"
  PROJECT_PATH: "."

jobs:
  # ============================================
  # 版本信息提取
  # ============================================
  version:
    name: Extract Version Info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_tag: ${{ steps.get_version.outputs.version_tag }}
      short_sha: ${{ steps.get_version.outputs.short_sha }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Version Information
        id: get_version
        run: |
          # 获取版本号
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            VERSION_TAG=${GITHUB_REF#refs/tags/}
          else
            # 从 project.godot 读取版本
            if [ -f "project.godot" ]; then
              VERSION=$(grep "config/version" project.godot | cut -d'"' -f2)
            else
              VERSION="0.1.0"
            fi
            VERSION_TAG="dev-$(git rev-parse --short HEAD)"
          fi
          
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          echo "📦 Building version: $VERSION"
          echo "🏷️  Tag: $VERSION_TAG"
          echo "🔨 Commit: $SHORT_SHA"

  # ============================================
  # Linux 构建
  # ============================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: version
    if: ${{ github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all' || github.event.inputs.platform == '' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz -O templates.tpz
          unzip -o templates.tpz -d ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/
          echo "✅ Export templates installed"

      - name: Import Assets
        run: |
          echo "Importing assets..."
          timeout 180 godot --headless --editor --quit 2>&1 || true
          echo "✅ Assets imported"

      - name: Build Linux
        run: |
          echo "Building Linux executable..."
          mkdir -p build/linux
          godot --headless --path ${{ env.PROJECT_PATH }} \
            --export-release "Linux/X11" \
            "build/linux/${{ env.EXPORT_NAME }}" \
            2>&1 | tee build_linux.log
          if [ -f "build/linux/${{ env.EXPORT_NAME }}" ]; then
            chmod +x "build/linux/${{ env.EXPORT_NAME }}"
            echo "✅ Linux build successful"
          else
            echo "❌ Linux build failed"
            exit 1
          fi

      - name: Package Linux Build
        run: |
          cd build/linux
          tar -czf "../${{ env.EXPORT_NAME }}-${{ needs.version.outputs.version }}-linux.tar.gz" .
          echo "✅ Linux package created"

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/${{ env.EXPORT_NAME }}-${{ needs.version.outputs.version }}-linux.tar.gz
          retention-days: 7

  # ============================================
  # Windows 构建
  # ============================================
  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    needs: version
    if: ${{ github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all' || github.event.inputs.platform == '' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz -O templates.tpz
          unzip -o templates.tpz -d ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/
          echo "✅ Export templates installed"

      - name: Import Assets
        run: |
          echo "Importing assets..."
          timeout 180 godot --headless --editor --quit 2>&1 || true
          echo "✅ Assets imported"

      - name: Build Windows
        run: |
          echo "Building Windows executable..."
          mkdir -p build/windows
          godot --headless --path ${{ env.PROJECT_PATH }} \
            --export-release "Windows Desktop" \
            "build/windows/${{ env.EXPORT_NAME }}.exe" \
            2>&1 | tee build_windows.log
          if [ -f "build/windows/${{ env.EXPORT_NAME }}.exe" ]; then
            echo "✅ Windows build successful"
          else
            echo "❌ Windows build failed"
            exit 1
          fi

      - name: Package Windows Build
        run: |
          cd build/windows
          zip -r "../${{ env.EXPORT_NAME }}-${{ needs.version.outputs.version }}-windows.zip" .
          echo "✅ Windows package created"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/${{ env.EXPORT_NAME }}-${{ needs.version.outputs.version }}-windows.zip
          retention-days: 7

  # ============================================
  # Web 构建
  # ============================================
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: version
    if: ${{ github.event.inputs.platform == 'web' || github.event.inputs.platform == 'all' || github.event.inputs.platform == '' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz -O templates.tpz
          unzip -o templates.tpz -d ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/
          echo "✅ Export templates installed"

      - name: Import Assets
        run: |
          echo "Importing assets..."
          timeout 180 godot --headless --editor --quit 2>&1 || true
          echo "✅ Assets imported"

      - name: Build Web
        run: |
          echo "Building Web version..."
          mkdir -p build/web
          godot --headless --path ${{ env.PROJECT_PATH }} \
            --export-release "Web" \
            "build/web/index.html" \
            2>&1 | tee build_web.log
          if [ -f "build/web/index.html" ]; then
            echo "✅ Web build successful"
          else
            echo "❌ Web build failed"
            exit 1
          fi

      - name: Package Web Build
        run: |
          cd build/web
          zip -r "../${{ env.EXPORT_NAME }}-${{ needs.version.outputs.version }}-web.zip" .
          echo "✅ Web package created"

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/${{ env.EXPORT_NAME }}-${{ needs.version.outputs.version }}-web.zip
          retention-days: 7
