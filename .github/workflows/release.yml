# Release Pipeline for Mist Painter (迷雾绘者)
# Automatic Release Creation with GitHub Releases

name: Release - Auto Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean

env:
  GODOT_VERSION: "4.2.2"
  EXPORT_NAME: "mist-painter"

jobs:
  # ============================================
  # 提取版本信息
  # ============================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version Info
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            # 从 tag 提取版本
            VERSION=${GITHUB_REF#refs/tags/v}
            TAG_NAME=${GITHUB_REF#refs/tags/}
            IS_PRERELEASE="false"
            
            # 检查是否是预发布版本 (包含 alpha, beta, rc)
            if [[ $VERSION =~ (alpha|beta|rc|preview) ]]; then
              IS_PRERELEASE="true"
            fi
          else
            # 手动触发
            VERSION=${{ github.event.inputs.version }}
            TAG_NAME="v${{ github.event.inputs.version }}"
            IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
          fi
          
          RELEASE_NAME="迷雾绘者 v${VERSION}"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          
          echo "📦 Version: $VERSION"
          echo "🏷️  Tag: $TAG_NAME"
          echo "🚀 Release: $RELEASE_NAME"
          echo "🔖 Prerelease: $IS_PRERELEASE"

  # ============================================
  # 构建所有平台
  # ============================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz -O templates.tpz
          unzip -o templates.tpz -d ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Import Assets
        run: timeout 180 godot --headless --editor --quit 2>&1 || true

      - name: Build Linux
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux/X11" "build/linux/${{ env.EXPORT_NAME }}"
          chmod +x "build/linux/${{ env.EXPORT_NAME }}"

      - name: Package Linux
        run: |
          cd build/linux
          tar -czf "../${{ env.EXPORT_NAME }}-${{ needs.prepare.outputs.version }}-linux.tar.gz" .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/${{ env.EXPORT_NAME }}-${{ needs.prepare.outputs.version }}-linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz -O templates.tpz
          unzip -o templates.tpz -d ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Import Assets
        run: timeout 180 godot --headless --editor --quit 2>&1 || true

      - name: Build Windows
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" "build/windows/${{ env.EXPORT_NAME }}.exe"

      - name: Package Windows
        run: |
          cd build/windows
          zip -r "../${{ env.EXPORT_NAME }}-${{ needs.prepare.outputs.version }}-windows.zip" .

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/${{ env.EXPORT_NAME }}-${{ needs.prepare.outputs.version }}-windows.zip

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz -O templates.tpz
          unzip -o templates.tpz -d ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Import Assets
        run: timeout 180 godot --headless --editor --quit 2>&1 || true

      - name: Build Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" "build/web/index.html"

      - name: Package Web
        run: |
          cd build/web
          zip -r "../${{ env.EXPORT_NAME }}-${{ needs.prepare.outputs.version }}-web.zip" .

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/${{ env.EXPORT_NAME }}-${{ needs.prepare.outputs.version }}-web.zip

  # ============================================
  # 创建 GitHub Release
  # ============================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-linux, build-windows, build-web]
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG_NAME="${{ needs.prepare.outputs.tag_name }}"
          
          # 生成变更日志
          echo "## 🎮 迷雾绘者 v${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          
          # 获取自上次发布以来的提交
          echo "### 📝 变更内容" >> release_notes.md
          echo "" >> release_notes.md
          
          # 获取最近的提交 (最多 20 条)
          git log --pretty=format:"- %s (%h)" --no-merges -20 >> release_notes.md 2>/dev/null || echo "- 初始版本" >> release_notes.md
          
          echo "" >> release_notes.md
          echo "### 📦 下载" >> release_notes.md
          echo "" >> release_notes.md
          echo "| 平台 | 文件名 |" >> release_notes.md
          echo "|------|--------|" >> release_notes.md
          echo "| 🐧 Linux | \`${{ env.EXPORT_NAME }}-${VERSION}-linux.tar.gz\` |" >> release_notes.md
          echo "| 🪟 Windows | \`${{ env.EXPORT_NAME }}-${VERSION}-windows.zip\` |" >> release_notes.md
          echo "| 🌐 Web | \`${{ env.EXPORT_NAME }}-${VERSION}-web.zip\` |" >> release_notes.md
          
          echo "" >> release_notes.md
          echo "### 🚀 安装说明" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Linux:**" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "tar -xzf ${{ env.EXPORT_NAME }}-${VERSION}-linux.tar.gz" >> release_notes.md
          echo "./${{ env.EXPORT_NAME }}" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "**Windows:** 解压 zip 文件后运行 `${{ env.EXPORT_NAME }}.exe`" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Web:** 解压后在浏览器中打开 `index.html`" >> release_notes.md
          
          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ needs.prepare.outputs.release_name }}
          body_path: release_notes.md
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: |
            artifacts/linux-release/*.tar.gz
            artifacts/windows-release/*.zip
            artifacts/web-release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ Release ${{ needs.prepare.outputs.release_name }} created successfully!"
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.tag_name }}"
