<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>迷雾绘者 - 谜题编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* 顶部工具栏 */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    .top-bar h1 {
      font-size: 18px;
      color: #e94560;
    }

    .top-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #e94560;
      color: white;
    }

    .btn-primary:hover {
      background: #ff6b6b;
    }

    .btn-secondary {
      background: #0f3460;
      color: #eee;
    }

    .btn-secondary:hover {
      background: #1a4a7a;
    }

    /* 主编辑区 */
    .editor-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* 左侧工具栏 */
    .left-toolbar {
      width: 60px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
    }

    .tool-btn {
      width: 44px;
      height: 44px;
      border: 2px solid transparent;
      border-radius: 8px;
      background: #0f3460;
      color: #eee;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s;
    }

    .tool-btn:hover {
      background: #1a4a7a;
    }

    .tool-btn.active {
      border-color: #e94560;
      background: #1a4a7a;
    }

    .tool-btn[data-tool="select"]::before { content: "↖"; }
    .tool-btn[data-tool="terrain"]::before { content: "▦"; }
    .tool-btn[data-tool="puzzle"]::before { content: "🧩"; }
    .tool-btn[data-tool="mist"]::before { content: "🌫"; }
    .tool-btn[data-tool="eraser"]::before { content: "⌫"; }

    /* 画布区域 */
    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      position: relative;
      overflow: auto;
    }

    #game-canvas {
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    /* 右侧属性面板 */
    .right-panel {
      width: 280px;
      background: #16213e;
      border-left: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid #0f3460;
      font-weight: 600;
    }

    .panel-content {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }

    .property-group {
      margin-bottom: 20px;
    }

    .property-group h3 {
      font-size: 14px;
      color: #e94560;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .property-row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .property-row label {
      width: 80px;
      font-size: 13px;
      color: #aaa;
    }

    .property-row input,
    .property-row select {
      flex: 1;
      padding: 6px 10px;
      background: #0f3460;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #eee;
      font-size: 13px;
    }

    .property-row input:focus,
    .property-row select:focus {
      outline: none;
      border-color: #e94560;
    }

    /* 底部状态栏 */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      font-size: 12px;
      color: #888;
    }

    .status-info {
      display: flex;
      gap: 20px;
    }

    /* 图块选择器 */
    .tile-palette {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .tile-item {
      aspect-ratio: 1;
      background: #0f3460;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .tile-item:hover {
      border-color: #1a4a7a;
    }

    .tile-item.selected {
      border-color: #e94560;
    }

    /* 谜题类型列表 */
    .puzzle-type-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .puzzle-type-item {
      padding: 10px;
      background: #0f3460;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .puzzle-type-item:hover {
      border-color: #1a4a7a;
    }

    .puzzle-type-item.selected {
      border-color: #e94560;
      background: #1a4a7a;
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #16213e;
    }

    ::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #1a4a7a;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 顶部工具栏 -->
    <div class="top-bar">
      <h1>🎨 迷雾绘者 - 谜题编辑器</h1>
      <div class="top-actions">
        <button class="btn btn-secondary" id="btn-new">新建</button>
        <button class="btn btn-secondary" id="btn-open">打开</button>
        <button class="btn btn-secondary" id="btn-save">保存</button>
        <button class="btn btn-primary" id="btn-export">导出关卡</button>
      </div>
    </div>

    <!-- 主编辑区 -->
    <div class="editor-container">
      <!-- 左侧工具栏 -->
      <div class="left-toolbar">
        <div class="tool-btn active" data-tool="select" title="选择工具"></div>
        <div class="tool-btn" data-tool="terrain" title="地形工具"></div>
        <div class="tool-btn" data-tool="puzzle" title="谜题工具"></div>
        <div class="tool-btn" data-tool="mist" title="迷雾工具"></div>
        <div class="tool-btn" data-tool="eraser" title="橡皮擦"></div>
      </div>

      <!-- 画布区域 -->
      <div class="canvas-container">
        <div id="game-canvas"></div>
      </div>

      <!-- 右侧属性面板 -->
      <div class="right-panel">
        <div class="panel-header">属性面板</div>
        <div class="panel-content" id="property-panel">
          <!-- 动态内容 -->
        </div>
      </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="status-bar">
      <div class="status-info">
        <span id="status-position">位置: 0, 0</span>
        <span id="status-grid">网格: 40x22</span>
        <span id="status-zoom">缩放: 100%</span>
      </div>
      <div class="status-message" id="status-message">就绪</div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
